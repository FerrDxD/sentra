<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dokumentasi - OSIS Nawasena</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,100,1,200&" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dokum.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
            
            <div class="logo">
                <a href="index.html">SENTRA<span>.</span></a>
            </div>
            
            <ul class="nav-links" id="nav-links">
                <li><a href="index.html">Beranda</a></li>
                <li><a href="struktur.html">Struktur</a></li>
                <li><a href="program.html">Program Kerja</a></li>
                <li><a href="dokumentasi.html" style="color:var(--accent); font-weight:700;">Dokumentasi</a></li>
                <li><a href="sponsor.html">Sponsorship</a></li>
                <li><a href="x.html">AURORA</a></li>
            </ul>

            <button id="dark-mode-toggle" class="btn-theme"><span class="material-symbols-outlined">dark_mode</span></button>
        </div>
    </nav>

    <main class="container section-padding">
        <div class="section-header" style="margin-top: 4rem;">
            <h2>Dokumentasi Kegiatan</h2>
            <p>Jejak langkah dan momen berharga dalam setiap program kerja kami.</p>
        </div>

        <div class="modern-grid" id="gallery-container">
            <!-- Konten diisi oleh dokum.js -->
        </div>
    </main>

    <!-- ============================================================
         ARTICLE MODAL
    ============================================================ -->
    <div id="articleModal" class="article-modal">
        <div class="article-container">

            <!-- Hero Foto -->
            <div class="article-hero">
                <img id="articleModalHero" src="" alt="">
                <div class="article-hero-overlay"></div>
                <div class="article-hero-meta">
                    <span class="article-hero-tag">Kegiatan OSIS</span>
                    <h2 class="article-hero-title" id="articleModalTitle">Loading...</h2>
                    <p class="article-hero-date" id="articleModalDate">Loading...</p>
                </div>
                <button class="close-article" onclick="closeArticle()">&times;</button>
            </div>

            <!-- Body Artikel -->
            <div class="article-body">

                <!-- Narasi / tulisan artikel -->
                <div class="article-narasi" id="articleModalNarasi">
                    <!-- diisi JS -->
                </div>

                <!-- Divider -->
                <div class="article-divider">
                    <span>Galeri Foto</span>
                </div>

                <!-- Grid Foto -->
                <div id="articleModalPhotos">
                    <!-- diisi JS -->
                </div>

            </div>
        </div>
    </div>

    <!-- ============================================================
         LIGHTBOX
    ============================================================ -->
    <div id="lightboxModal" class="lightbox">
        <div class="lightbox-inner">

            <div class="lightbox-top">
                <div class="lightbox-title-wrap">
                    <h3 id="lbEventTitle"></h3>
                </div>
                <span class="lightbox-counter" id="lbCounter">1 / 1</span>
                <button class="close-lightbox" onclick="closeLightbox()">&times;</button>
            </div>

            <div class="lightbox-stage">
                <button class="lb-nav prev" onclick="lbPrev()">
                    <span class="material-symbols-outlined">chevron_left</span>
                </button>

                <img id="lbMainImage" src="" alt="">

                <button class="lb-nav next" onclick="lbNext()">
                    <span class="material-symbols-outlined">chevron_right</span>
                </button>
            </div>

            <div class="lb-caption" id="lbCaption"></div>

            <div class="lightbox-strip">
                <div class="lb-thumb-list" id="lbThumbList">
                    <!-- thumbnails diisi JS -->
                </div>
            </div>

        </div>
    </div>

    <!-- Mini Music Player -->
    <div class="mini-player">
        <div class="player-info">
            <p class="track-name" style="font-weight: bold; font-size: 0.8rem;">Radio Nawasena</p>
            <div class="player-controls">
                <button class="btn-player" id="btn-play-pause" onclick="playPauseMusic()"><span class="material-symbols-outlined">play_arrow</span></button>
                <button class="btn-player" onclick="nextMusic()"><span class="material-symbols-outlined">skip_next</span></button>
            </div>
        </div>
        <audio id="audio-player"></audio>
    </div>

    <script src="js/script.js"></script>
    <script src="js/dokum.js"></script>
</body>
</html>
